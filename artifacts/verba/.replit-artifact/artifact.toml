kind = "web"
previewPath = "/"
title = "Verba"
version = "1.0.0"
id = "artifacts/verba"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19022

[services.development]
run = "pnpm --filter @workspace/verba run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/verba", "run", "build" ]
publicDir = "artifacts/verba/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19022"
BASE_PATH = "/"
